services:
  public-repo-dashboard:
    build:
      context: .
      args:
        - NEXT_PUBLIC_APP_VERSION=latest
    container_name: public-repo-dashboard
    environment:
      # This should match the API service URL.
      - NEXT_PUBLIC_ENDPOINT_URL=https://dashboard.cachyos.org/api
    ports:
      - 3000:3000
    restart: on-failure
    volumes:
      - cache-data:/app/.next/cache

volumes:
  cache-data:
